bind_host: 127.0.0.1
port: 8080
log_level: info


auth:
   issuer: http://authentik.cppwiki.local:9000/application/o/cpp-wiki/
   audience: cpp-wiki
   jwks_url: http://authentik.cppwiki.local:9000/application/o/cpp-wiki/jwks/

sync:
   enabled: true
   gateway_url: http://127.0.0.1:4984/cppwiki
   admin_url: http://127.0.0.1:4985/cppwiki
   database_name: cppwiki
   role_channels:
      wiki.admin: ["*"]
      wiki.editor: ["workspace:default"]
   group_channels:
      team.engineering: ["workspace:engineering"]

# BlockNote AI MVP (ADR-010/ADR-011/ADR-012): server-mediated AI backend.
# Disabled by default; the desktop client falls back to the local-key path
# (Settings > AI) when this is disabled. Never commit a real api_key here —
# set it via the CPPWIKI_AI_API_KEY environment variable instead.
ai:
   enabled: false
   base_url: https://api.openai.com/v1/chat/completions
   api_key: ""
   model: gpt-4o-mini


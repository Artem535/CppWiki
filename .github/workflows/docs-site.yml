name: Docs Site

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - "doc/**"
      - "antora-playbook.yml"
      - ".github/workflows/docs-site.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "doc/**"
      - "antora-playbook.yml"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Antora site
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate site
        run: npx antora generate antora-playbook.yml

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: build/site
          retention-days: 14

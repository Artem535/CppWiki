name: Diag Qt Arch
on:
  push:
    branches:
      - ci/fix-package-release-workflow
jobs:
  diag:
    runs-on: windows-latest
    steps:
      - name: List available Windows archs for Qt 6.11.1
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt list-qt windows desktop --arch 6.11.1

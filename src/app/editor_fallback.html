<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2933;
        background: #f7f8fa;
      }
      main {
        box-sizing: border-box;
        min-height: 100vh;
        padding: 48px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        font-weight: 600;
      }
      p {
        max-width: 720px;
        margin: 0;
        line-height: 1.55;
      }
      code {
        border-radius: 4px;
        background: #e5e7eb;
        padding: 2px 5px;
      }
    </style>
    <title>CppWiki Editor Host</title>
  </head>
  <body>
    <main>
      <h1>CppWiki Editor Host</h1>
      <p>
        QWebEngine is running, but the BlockNote editor bundle has not been built yet.
        Run <code>npm ci</code> and <code>npm run build</code> in <code>frontend/editor</code>.
      </p>
      <p style="margin-top: 16px;">Expected bundle: <code>%1</code></p>
    </main>
  </body>
</html>
